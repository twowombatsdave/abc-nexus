name: DBT Seed and Run

on:
  workflow_dispatch:

jobs:
  dbt:
    name: Seed and Run dbt
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create config directory
        run: mkdir -p config

      - name: Write service account JSON from secret
        run: |
          # Write the JSON content to a temporary file first
          echo '${{ secrets.DBT_SERVICE_ACCOUNT }}' > /tmp/service_account.json
          # Use Python to validate and copy the JSON
          python -c "
          import json
          import shutil
          # Read and validate the JSON
          with open('/tmp/service_account.json', 'r') as f:
              data = json.load(f)
          # Write to final location
          with open('$GITHUB_WORKSPACE/config/dbt_service_account.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('✓ Service account JSON written and validated')
          "

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set environment for dbt
        env:
          DBT_DATASET: ${{ secrets.DBT_DATASET }}
        run: |
          echo "DBT_DATASET=${DBT_DATASET}" >> $GITHUB_ENV
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/config/dbt_service_account.json" >> $GITHUB_ENV
          echo "DBT_SERVICE_ACCOUNT=$GITHUB_WORKSPACE/config/dbt_service_account.json" >> $GITHUB_ENV
          echo "DBT_PROFILES_DIR=$GITHUB_WORKSPACE/dbt/profiles" >> $GITHUB_ENV
          echo "DBT_PROJECT_DIR=$GITHUB_WORKSPACE/dbt" >> $GITHUB_ENV

      - name: Install dbt packages
        run: dbt deps --profiles-dir dbt/profiles --project-dir dbt

      - name: dbt seed
        run: dbt seed --profiles-dir dbt/profiles --project-dir dbt

      - name: dbt run
        run: dbt run --profiles-dir dbt/profiles --project-dir dbt

      - name: dbt test
        run: dbt test --profiles-dir dbt/profiles --project-dir dbt

